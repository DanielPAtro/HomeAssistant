<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Porta Retrato Digital</title>
    <!-- Link para os ícones de clima animados -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/weather-icons/2.0.12/css/weather-icons.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Container do Slide */
        .slide-container {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .slide {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
            background-size: cover;
            background-position: center;
        }

        .slide.active {
            opacity: 1;
        }

        /* Estilo base para os Widgets (Sem fundo) */
        .widget {
            position: absolute;
            bottom: 30px;
            z-index: 10;
            color: white;
            text-shadow: 0px 2px 10px rgba(0, 0, 0, 0.85), 0px 4px 20px rgba(0, 0, 0, 0.6);
            pointer-events: none;
            display: flex;
            flex-direction: column;
        }

        /* Widget de Hora/Data - Canto Inferior Esquerdo */
        .clock-widget {
            left: 30px;
            align-items: flex-start;
        }

        .time-container {
            display: flex;
            align-items: baseline;
        }

        .time {
            font-size: 3.8rem;
            font-weight: 700;
            letter-spacing: -1px;
            line-height: 0.9;
        }

        .date {
            font-size: 1.1rem;
            font-weight: 400;
            opacity: 0.85;
            text-transform: capitalize;
            margin-top: 8px;
        }

        /* Widget de Clima - Canto Inferior Direito */
        .weather-widget {
            right: 30px;
            align-items: flex-end;
            text-align: right;
        }

        .weather-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .weather-icon {
            font-size: 3rem;
            color: #f1c40f;
            animation: pulse 3s infinite ease-in-out;
            filter: drop-shadow(0px 2px 8px rgba(0,0,0,0.5));
        }

        .weather-info {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        .temp {
            font-size: 2.2rem;
            font-weight: 700;
            line-height: 1;
        }

        .condition {
            font-size: 1rem;
            font-weight: 400;
            opacity: 0.85;
            text-transform: capitalize;
            margin-top: 4px;
        }

        /* Animação suave para o ícone do clima */
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.06); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="slide-container">
        <!-- Adicione o caminho das suas fotos aqui -->
        <div class="slide active" style="background-image: url('foto1.jpg.jpeg');"></div>
        <div class="slide" style="background-image: url('foto2.jpg.jpeg');"></div>
        <div class="slide" style="background-image: url('foto3.jpg.jpeg');"></div>
    </div>

    <!-- Relógio (Inferior Esquerdo) em formato 24h -->
    <div class="widget clock-widget">
        <div class="time-container">
            <div class="time" id="clock">00:00</div>
        </div>
        <div class="date" id="date">Quarta, 24 de Junho</div>
    </div>

    <!-- Clima (Inferior Direito) -->
    <div class="widget weather-widget">
        <div class="weather-container">
            <div class="weather-info">
                <div class="temp" id="temp">--°C</div>
                <div class="condition" id="condition">Carregando...</div>
            </div>
            <i class="wi wi-day-cloudy weather-icon" id="w-icon"></i>
        </div>
    </div>

    <script>
        // --- CONFIGURAÇÃO DA API DE CLIMA (OpenWeatherMap) ---
        // IMPORTANTE: Altere para sua cidade e coloque sua chave gerada no site deles
        const CIDADE = "Maricá,BR"; 
        const API_KEY = "4df3c82852ef75c3fcd6f18d02b78dbc"; 

        // --- CONFIGURAÇÃO DO SLIDE ---
        const slides = document.querySelectorAll('.slide');
        let currentSlide = 0;
        const slideInterval = 6000; 

        function nextSlide() {
            slides[currentSlide].classList.remove('active');
            currentSlide = (currentSlide + 1) % slides.length;
            slides[currentSlide].classList.add('active');
        }
        setInterval(nextSlide, slideInterval);

        // --- RELÓGIO FORMATO 24 HORAS ---
        function updateClock() {
            const now = new Date();
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');

            document.getElementById('clock').textContent = `${hours}:${minutes}`;

            const options = { weekday: 'long', day: 'numeric', month: 'long' };
            document.getElementById('date').textContent = now.toLocaleDateString('pt-BR', options);
        }
        setInterval(updateClock, 1000);
        updateClock();

        // --- BUSCA DE PREVISÃO DO TEMPO ---
        async function getWeather() {
            if (API_KEY === "4df3c82852ef75c3fcd6f18d02b78dbc") {
                document.getElementById('condition').textContent = "Sem API Key";
                return;
            }

            try {
                const response = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${CIDADE}&appid=${API_KEY}&units=metric&lang=pt_br`);
                const data = await response.json();

                if (response.ok) {
                    const temp = Math.round(data.main.temp);
                    const desc = data.weather[0].description;
                    const iconCode = data.weather[0].icon;

                    document.getElementById('temp').textContent = `${temp}°C`;
                    document.getElementById('condition').textContent = desc;
                    
                    mapWeatherIcon(iconCode);
                }
            } catch (error) {
                console.log("Erro ao buscar clima:", error);
            }
        }

        function mapWeatherIcon(code) {
            const iconElement = document.getElementById('w-icon');
            iconElement.className = "wi weather-icon "; 

            const iconMap = {
                "01d": "wi-day-sunny", "01n": "wi-night-clear",
                "02d": "wi-day-cloudy", "02n": "wi-night-alt-cloudy",
                "03d": "wi-cloud", "03n": "wi-cloud",
                "04d": "wi-cloudy", "04n": "wi-cloudy",
                "09d": "wi-day-showers", "09n": "wi-night-alt-showers",
                "10d": "wi-day-rain", "10n": "wi-night-alt-rain",
                "11d": "wi-day-thunderstorm", "11n": "wi-night-alt-thunderstorm",
                "13d": "wi-day-snow", "13n": "wi-night-alt-snow",
                "50d": "wi-day-fog", "50n": "wi-night-fog"
            };

            iconElement.className += iconMap[code] || "wi-day-cloudy";
        }

        // Atualiza o clima a cada 15 minutos
        setInterval(getWeather, 900000); 
        getWeather();
    </script>
</body>
</html>
