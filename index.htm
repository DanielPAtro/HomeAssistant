<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Porta Retrato Digital</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Container do Slide */
        .slide-container {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .slide {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
            background-size: cover;
            background-position: center;
        }

        .slide.active {
            opacity: 1;
        }

        /* Widget de Hora/Home no Canto Inferior Esquerdo */
        .home-widget {
            position: absolute;
            bottom: 20px;
            left: 20px;
            z-index: 10;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(8px);
            padding: 15px 25px;
            border-radius: 15px;
            color: white;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            pointer-events: none; /* Não atrapalha o toque se não necessário */
        }

        .time {
            font-size: 2.5rem;
            font-weight: bold;
            letter-spacing: 1px;
            line-height: 1;
        }

        .date {
            font-size: 0.9rem;
            margin-top: 5px;
            opacity: 0.8;
            text-transform: capitalize;
        }
    </style>
</head>
<body>

    <div class="slide-container">
        <div class="slide active" style="background-image: url('foto1.jpg');"></div>
        <div class="slide" style="background-image: url('foto2.jpg');"></div>
        <div class="slide" style="background-image: url('foto3.jpg');"></div>
    </div>

    <div class="home-widget">
        <div class="time" id="clock">00:00</div>
        <div class="date" id="date">Quarta, 24 de Junho</div>
    </div>

    <script>
        // --- CONFIGURAÇÃO DO SLIDE ---
        const slides = document.querySelectorAll('.slide');
        let currentSlide = 0;
        const slideInterval = 6000; // Tempo de cada foto em milissegundos (6 segundos)

        function nextSlide() {
            slides[currentSlide].classList.remove('active');
            currentSlide = (currentSlide + 1) % slides.length;
            slides[currentSlide].classList.add('active');
        }

        setInterval(nextSlide, slideInterval);

        // --- CONFIGURAÇÃO DO RELÓGIO ---
        function updateClock() {
            const now = new Date();
            
            // Hora
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            document.getElementById('clock').textContent = `${hours}:${minutes}`;

            // Data
            const options = { weekday: 'long', day: 'numeric', month: 'long' };
            document.getElementById('date').textContent = now.toLocaleDateString('pt-BR', options);
        }

        setInterval(updateClock, 1000);
        updateClock(); // Executa imediatamente ao carregar
    </script>
</body>
</html>
