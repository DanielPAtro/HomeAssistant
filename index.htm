<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Porta Retrato Digital</title>
    <!-- Link para os ícones de clima animados (Skycons baseados em CSS/SVG) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/weather-icons/2.0.12/css/weather-icons.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Container do Slide */
        .slide-container {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .slide {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
            background-size: cover;
            background-position: center;
        }

        .slide.active {
            opacity: 1;
        }

        /* Widget de Hora/Previsão no Canto Inferior Esquerdo */
        .home-widget {
            position: absolute;
            bottom: 25px;
            left: 25px;
            z-index: 10;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(12px);
            padding: 20px 25px;
            border-radius: 20px;
            color: white;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.15);
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
        }

        .time-container {
            display: flex;
            align-items: baseline;
            gap: 5px;
        }

        .time {
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: -1px;
            line-height: 1;
        }

        .ampm {
            font-size: 1.2rem;
            font-weight: 500;
            text-transform: uppercase;
            opacity: 0.9;
        }

        .date {
            font-size: 0.95rem;
            opacity: 0.75;
            text-transform: capitalize;
            margin-bottom: 5px;
        }

        /* Linha divisória fina */
        .divider {
            height: 1px;
            background: rgba(255, 255, 255, 0.2);
            width: 100%;
        }

        /* Widget de Clima */
        .weather-container {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-top: 5px;
        }

        .weather-icon {
            font-size: 2.2rem;
            color: #f1c40f;
            animation: pulse 3s infinite ease-in-out;
        }

        .weather-info {
            display: flex;
            flex-direction: column;
        }

        .temp {
            font-size: 1.4rem;
            font-weight: 600;
        }

        .condition {
            font-size: 0.85rem;
            opacity: 0.8;
            text-transform: capitalize;
        }

        /* Animação suave para o ícone */
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.08); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <div class="slide-container">
        <!-- Adicione o caminho das suas fotos aqui -->
        <div class="slide active" style="background-image: url('foto1.jpg.jpeg');"></div>
        <div class="slide" style="background-image: url('foto2.jpg.jpeg');"></div>
        <div class="slide" style="background-image: url('foto3.jpg.jpeg');"></div>
    </div>

    <!-- Home/Clock & Weather Widget -->
    <div class="home-widget">
        <div class="time-container">
            <div class="time" id="clock">12:00</div>
            <div class="ampm" id="ampm">PM</div>
        </div>
        <div class="date" id="date">Quarta, 24 de Junho</div>
        
        <div class="divider"></div>

        <!-- Clima -->
        <div class="weather-container">
            <!-- Ícone animado via classe do Weather Icons -->
            <i class="wi wi-day-cloudy weather-icon" id="w-icon"></i>
            <div class="weather-info">
                <div class="temp" id="temp">--°C</div>
                <div class="condition" id="condition">Carregando clima...</div>
            </div>
        </div>
    </div>

    <script>
        // --- CONFIGURAÇÃO DA API DE CLIMA (OpenWeatherMap) ---
        // IMPORTANTE: Substitua pela sua cidade e sua chave da API gratuita do OpenWeather
        const CIDADE = "SuaCidade,BR"; 
        const API_KEY = "SUA_API_KEY_AQUI"; 

        // --- CONFIGURAÇÃO DO SLIDE ---
        const slides = document.querySelectorAll('.slide');
        let currentSlide = 0;
        const slideInterval = 6000; 

        function nextSlide() {
            slides[currentSlide].classList.remove('active');
            currentSlide = (currentSlide + 1) % slides.length;
            slides[currentSlide].classList.add('active');
        }
        setInterval(nextSlide, slideInterval);

        // --- RELÓGIO COM FORMATO 12 HORAS (AM/PM) ---
        function updateClock() {
            const now = new Date();
            let hours = now.getHours();
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const ampm = hours >= 12 ? 'PM' : 'AM';
            
            hours = hours % 12;
            hours = hours ? hours : 12; // O formato para '0' deve ser '12'
            hours = String(hours).padStart(2, '0');

            document.getElementById('clock').textContent = `${hours}:${minutes}`;
            document.getElementById('ampm').textContent = ampm;

            const options = { weekday: 'long', day: 'numeric', month: 'long' };
            document.getElementById('date').textContent = now.toLocaleDateString('pt-BR', options);
        }
        setInterval(updateClock, 1000);
        updateClock();

        // --- BUSCA DE PREVISÃO DO TEMPO ---
        async function getWeather() {
            if (API_KEY === "SUA_API_KEY_AQUI") {
                document.getElementById('condition').textContent = "Configure a API Key";
                return;
            }

            try {
                const response = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${CIDADE}&appid=${API_KEY}&units=metric&lang=pt_br`);
                const data = await response.json();

                if (response.ok) {
                    const temp = Math.round(data.main.temp);
                    const desc = data.weather[0].description;
                    const iconCode = data.weather[0].icon;

                    document.getElementById('temp').textContent = `${temp}°C`;
                    document.getElementById('condition').textContent = desc;
                    
                    // Mapeia os ícones do OpenWeather para a biblioteca animada Weather Icons
                    mapWeatherIcon(iconCode);
                }
            } catch (error) {
                console.log("Erro ao buscar clima:", error);
            }
        }

        function mapWeatherIcon(code) {
            const iconElement = document.getElementById('w-icon');
            iconElement.className = "wi weather-icon "; // limpa classes antigas

            // Mapeamento básico de ícones (dia/noite)
            const iconMap = {
                "01d": "wi-day-sunny", "01n": "wi-night-clear",
                "02d": "wi-day-cloudy", "02n": "wi-night-alt-cloudy",
                "03d": "wi-cloud", "03n": "wi-cloud",
                "04d": "wi-cloudy", "04n": "wi-cloudy",
                "09d": "wi-day-showers", "09n": "wi-night-alt-showers",
                "10d": "wi-day-rain", "10n": "wi-night-alt-rain",
                "11d": "wi-day-thunderstorm", "11n": "wi-night-alt-thunderstorm",
                "13d": "wi-day-snow", "13n": "wi-night-alt-snow",
                "50d": "wi-day-fog", "50n": "wi-night-fog"
            };

            iconElement.className += iconMap[code] || "wi-day-cloudy";
        }

        // Atualiza o clima a cada 15 minutos para não estourar o limite da API gratuita
        setInterval(getWeather, 900000); 
        getWeather();
    </script>
</body>
</html>
